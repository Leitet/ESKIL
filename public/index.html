<!doctype html>
<html lang="sv">
<head>

<title>ESKIL — Scout-tävlingssystem</title>

        <img class="splash-logo" src="/assets/logo-scouterna-tagline-white.svg" alt="Scouterna">

      </div>
    </div>

  <div class="toast-wrap" id="toasts"></div>

  <script type="module" src="/js/app.js"></script>
